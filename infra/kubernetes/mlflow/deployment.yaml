apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: mlflow
          image: python:3.10-slim
          command: ["/bin/sh", "-c"]
          args:
            - pip install mlflow boto3 psycopg2-binary && \
              mlflow server \
              --backend-store-uri $BACKEND_STORE_URI \
              --default-artifact-root $ARTIFACT_ROOT \
              --host 0.0.0.0 \
              --port 5000
          env:
            - name: BACKEND_STORE_URI
              valueFrom:
                secretKeyRef:
                  name: mlflow-secrets
                  key: BACKEND_STORE_URI
            - name: ARTIFACT_ROOT
              valueFrom:
                secretKeyRef:
                  name: mlflow-secrets
                  key: ARTIFACT_ROOT
          ports:
            - containerPort: 5000