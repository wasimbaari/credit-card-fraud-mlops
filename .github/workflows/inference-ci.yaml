name: Inference Image Build (DevSecOps + OIDC + ArgoCD)

on:
  push:
    branches: [main]
    paths:
      - "src/inference/**"
      - "infra/kubernetes/apps/**"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  build-secure-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write 
      security-events: write

    env:
      AWS_REGION: ap-south-1
      ACCOUNT_ID: "734367008253"
      ECR_REPO: fraud-inference

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🛡️ 1. SNYK (Dependencies)
      - name: Install Snyk CLI
        uses: snyk/actions/setup@v1
      - name: Snyk Security Scan
        timeout-minutes: 5
        continue-on-error: true
        run: |
          snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high --skip-unresolved
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 🏗️ 2. CHECKOV (Dockerfile IaC)
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile
          quiet: true
          skip_check: CKV_DOCKER_2,CKV_DOCKER_3

      # 🔐 3. AWS OIDC AUTH
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      # 🔑 4. LOGIN & BUILD
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login \
          --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

      - name: Set Image Tag
        id: vars
        run: echo "TAG=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build Image
        run: |
          docker build -f docker/inference.Dockerfile \
            -t ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${{ steps.vars.outputs.TAG }} .

      # 🔍 5. TRIVY (Container Image Scan)
      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: '${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ steps.vars.outputs.TAG }}'
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      # 🚀 6. PUSH
      - name: Push Image
        run: |
          docker push ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${{ steps.vars.outputs.TAG }}

      # 🎡 7. GITOPS UPDATE (For ArgoCD)
      - name: Update Manifest for ArgoCD
        run: |
          # Updating the manifest in the apps folder that ArgoCD watches
          sed -i "s|image:.*|image: ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${{ steps.vars.outputs.TAG }}|g" infra/kubernetes/apps/inference-service.yaml
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add infra/kubernetes/apps/inference-service.yaml
          git commit -m "chore: deploy version ${{ steps.vars.outputs.TAG }} [skip ci]"
          git push