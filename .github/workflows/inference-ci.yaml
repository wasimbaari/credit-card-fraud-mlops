name: Inference Image Build (DevSecOps + OIDC + ArgoCD)

on:
  push:
    branches: [main]
    paths:
      - "src/inference/**"
      - "infra/kubernetes/apps/**"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  build-secure-and-push:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read   # ✅ no need for write anymore
      security-events: write

    env:
      AWS_REGION: ap-south-1
      ACCOUNT_ID: "734367008253"
      ECR_REPO: fraud-inference

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ⚡ 1. CACHE PIP
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 🛡️ 2. SNYK (Dependencies)
      - name: Install Snyk CLI
        uses: snyk/actions/setup@v1

      - name: Snyk Security Scan
        timeout-minutes: 5
        continue-on-error: true
        run: |
          snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high --skip-unresolved
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 🏗️ 3. CHECKOV (Dockerfile IaC)
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile
          quiet: true
          skip_check: CKV_DOCKER_2,CKV_DOCKER_3

      # 🔐 4. AWS OIDC AUTH
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      # 🔑 5. LOGIN TO ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ⚡ 6. DOCKER BUILDX
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🏷️ 7. SET VERSION TAG (IMMUTABLE)
      - name: Set Image Tag
        id: vars
        run: echo "TAG=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      # 🐳 8. BUILD & PUSH IMAGE
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/inference.Dockerfile
          push: true
          tags: ${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ steps.vars.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 🔍 9. TRIVY SCAN
      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: '${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ steps.vars.outputs.TAG }}'
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      # 📢 10. OUTPUT IMAGE (FOR VISIBILITY)
      - name: Print Image Info
        run: |
          echo "✅ Image pushed:"
          echo "${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${{ steps.vars.outputs.TAG }}"
