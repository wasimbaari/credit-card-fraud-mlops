stages:
  ingest:
    cmd: python -m src.data.ingest
    deps:
      - data/external/creditcard.csv
      - src/data/ingest.py
    outs:
      - data/raw/data.csv

  validate:
    cmd: python -m src.data.validate
    deps:
      - data/raw/data.csv
      - src/data/validate.py
    outs:
      - data/raw/validated.csv

  preprocess:
    cmd: python -m src.data.preprocess
    deps:
      - data/raw/validated.csv
      - src/data/preprocess.py
    outs:
      - data/processed/train.csv
      - data/processed/test.csv

  features:
    cmd: python -m src.features.feature_engineering
    deps:
      - data/processed/train.csv
      - data/processed/test.csv
      - src/features/feature_engineering.py
    outs:
      - data/processed/X_train.csv
      - data/processed/X_test.csv

  train:
    cmd: python -m src.training.train
    deps:
      - data/processed/X_train.csv
      - src/training/train.py
    outs:
      - models/model.joblib

  evaluate:
    cmd: python src/training/evaluate.py
    deps:
      - models/model.joblib
      - data/processed/X_test.csv
      - src/training/evaluate.py
    metrics:
      - reports/metrics.json:
          cache: false