apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fraud-mlops
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/wasimbaari/credit-card-fraud-mlops.git
    targetRevision: HEAD
    path: infra/kubernetes/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true