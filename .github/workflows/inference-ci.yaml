name: Inference CI/CD (DevSecOps + OIDC)

on:
  push:
    branches: [main]
    paths:
      - "src/inference/**"
      - "docker/inference.Dockerfile"
      - "requirements.txt"

jobs:
  build-secure-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write        # REQUIRED for AWS OIDC
      contents: write        # REQUIRED for GitOps Commit
      security-events: write # REQUIRED for uploading scan results to GitHub Security tab

    env:
      AWS_REGION: ap-south-1
      ECR_REPO: fraud-inference
      ACCOUNT_ID: "734367008253"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🛡️ 1. SNYK SCAN (Software Composition Analysis)
      # Scans Python dependencies for known CVEs before building
      - name: Snyk Security Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      # 🏗️ 2. CHECKOV SCAN (Infrastructure as Code)
      # Scans Dockerfile and Kubernetes YAMLs for misconfigurations
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,kubernetes
          quiet: true # Only show failed checks
          skip_check: CKV_DOCKER_2,CKV_DOCKER_3 # Skip overly strict healthcheck/user rules for standard ML builds

      # 🔐 OIDC AUTH (NO SECRETS)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      # 🔑 ECR LOGIN
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login \
          --username AWS \
          --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

      # 🏷️ VERSION TAG
      - name: Set Image Tag
        id: vars
        run: |
          TAG=v1.0.${{ github.run_number }}
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      # 🐳 BUILD IMAGE (Local only, not pushed yet!)
      - name: Build Image
        run: |
          docker build -f docker/inference.Dockerfile \
            -t ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${{ steps.vars.outputs.TAG }} .

      # 🐳 3. TRIVY SCAN (Container Security)
      # Scans the compiled image OS layers. Kills pipeline if CRITICAL vulns exist.
      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ steps.vars.outputs.TAG }}'
          format: 'table'
          exit-code: '1' # '1' strictly fails the build on vulnerabilities
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # 🚀 PUSH IMAGE (Only executes if Trivy gives the green light)
      - name: Push Image
        run: |
          docker push ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${{ steps.vars.outputs.TAG }}

      # 🔄 UPDATE MANIFEST
      - name: Update KServe Manifest
        run: |
          sed -i "s|image: .*|image: ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${{ steps.vars.outputs.TAG }}|g" infra/kubernetes/kserve/inference-service.yaml

      # 📦 COMMIT BACK (GITOPS)
      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "ci: secure deploy inference ${{ steps.vars.outputs.TAG }}" || echo "No changes"
          git push